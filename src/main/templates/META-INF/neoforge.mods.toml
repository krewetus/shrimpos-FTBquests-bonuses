modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/krewetus/shrimpos-FTBquests-bonuses/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="sqa_logo.png"
authors="shrimpo"
description='''
FTB Quests Markdown formatting options (or some of them...)
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="ftblibrary"
    type="required"
    versionRange="[2101.1.10,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="ftbquests"
    type="required"
    versionRange="[2101.1.27,)"
    ordering="AFTER"
    side="BOTH"

[[mixins]]
config = "shrimposquestingadditions.mixins.json"